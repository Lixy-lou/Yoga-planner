<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prana Flow</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --sage: #7a9e7e; --sage-light: #b5cdb7; --sage-dark: #4a6b4e;
    --cream: #f7f3ee; --warm: #e8ddd0; --clay: #c4956a; --clay-light: #e8c9a8;
    --ink: #2a2420; --ink-soft: #5a4f48; --white: #fdfaf7;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--ink); min-height: 100vh; font-size: 15px; }

  header { background: var(--ink); color: var(--cream); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 20px rgba(42,36,32,0.3); }
  .logo { font-family: 'Cormorant Garamond', serif; font-size: 1.7rem; font-weight: 300; letter-spacing: 0.04em; }
  .logo span { color: var(--sage-light); font-style: italic; }
  .header-actions { display: flex; gap: 8px; align-items: center; }

  .btn { padding: 7px 14px; border-radius: 4px; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; letter-spacing: 0.03em; transition: all 0.2s; white-space: nowrap; }
  .btn-primary { background: var(--sage); color: white; }
  .btn-primary:hover { background: var(--sage-dark); }
  .btn-secondary { background: transparent; color: var(--cream); border: 1px solid rgba(255,255,255,0.3); }
  .btn-secondary:hover { border-color: var(--sage-light); color: var(--sage-light); }
  .btn-clay { background: var(--clay); color: white; }
  .btn-clay:hover { background: #b07d52; }
  .btn-ghost { background: transparent; color: var(--ink-soft); border: 1px solid var(--warm); }
  .btn-ghost:hover { border-color: var(--sage); color: var(--sage-dark); }
  .btn-danger { background: transparent; color: #c0392b; border: 1px solid #e8c0bc; font-size: 11px; padding: 5px 12px; }
  .btn-danger:hover { background: #fdf0ef; }
  .btn-sm { padding: 4px 10px; font-size: 11px; }

  .app { display: flex; min-height: calc(100vh - 58px); }

  /* SIDEBAR */
  .sidebar { width: 260px; min-width: 260px; background: var(--white); border-right: 1px solid var(--warm); display: flex; flex-direction: column; }
  .sidebar-header { padding: 16px 16px 10px; border-bottom: 1px solid var(--warm); display: flex; justify-content: space-between; align-items: center; }
  .sidebar-title { font-size: 0.72rem; font-weight: 600; color: var(--ink-soft); letter-spacing: 0.07em; text-transform: uppercase; }
  .search-box { padding: 9px 14px; border-bottom: 1px solid var(--warm); }
  .search-box input { width: 100%; padding: 6px 10px; border: 1px solid var(--warm); border-radius: 4px; background: var(--cream); font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--ink); outline: none; }
  .search-box input:focus { border-color: var(--sage); }
  .search-box input::placeholder { color: #bbb; }
  .class-list { flex: 1; overflow-y: auto; padding: 4px 0; }
  .class-item { padding: 10px 16px; cursor: pointer; border-left: 3px solid transparent; transition: all 0.15s; }
  .class-item:hover { background: var(--cream); border-left-color: var(--sage-light); }
  .class-item.active { background: #edf3ee; border-left-color: var(--sage); }
  .class-item-name { font-weight: 500; font-size: 13px; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .class-item-meta { font-size: 11px; color: var(--ink-soft); display: flex; gap: 7px; align-items: center; }
  .badge { display: inline-block; padding: 1px 6px; border-radius: 20px; font-size: 10px; font-weight: 500; }
  .badge-Beginner { background: #e8f4e8; color: #4a7a4a; }
  .badge-Intermediate { background: #fef3e2; color: #9a6a20; }
  .badge-Advanced { background: #fde8e8; color: #9a3030; }
  .badge-AllLevels { background: #ece8f4; color: #5a4a7a; }
  .empty-sidebar { padding: 30px 16px; text-align: center; color: var(--ink-soft); font-size: 13px; line-height: 1.7; }

  .main { flex: 1; overflow-y: auto; }
  .welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 40vh; text-align: center; padding: 24px; }
  .welcome-icon { font-size: 2.5rem; margin-bottom: 12px; opacity: 0.6; }
  .welcome h2 { font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-weight: 300; margin-bottom: 10px; }
  .welcome p { color: var(--ink-soft); max-width: 400px; line-height: 1.7; margin-bottom: 22px; }

  .class-view { padding: 28px 32px; max-width: 780px; }
  .class-header { margin-bottom: 22px; padding-bottom: 18px; border-bottom: 1px solid var(--warm); display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; }
  .class-header-left { flex: 1; }
  .class-title-input { font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-weight: 300; border: none; background: transparent; color: var(--ink); width: 100%; outline: none; margin-bottom: 10px; }
  .class-title-input::placeholder { color: #ccc; }
  .meta-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .meta-field { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--ink-soft); }
  .meta-field label { font-weight: 500; white-space: nowrap; }
  .meta-field input, .meta-field select { border: 1px solid var(--warm); border-radius: 4px; padding: 3px 8px; font-family: 'DM Sans', sans-serif; font-size: 12px; background: var(--cream); color: var(--ink); outline: none; }

  .section { margin-bottom: 22px; }
  .section-title { font-size: 0.7rem; font-weight: 600; color: var(--sage-dark); letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 9px; display: flex; align-items: center; gap: 10px; }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--warm); }

  textarea.field { width: 100%; padding: 9px 12px; border: 1px solid var(--warm); border-radius: 6px; background: var(--white); font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--ink); resize: vertical; min-height: 65px; outline: none; line-height: 1.6; }
  textarea.field:focus { border-color: var(--sage); }
  input.field { width: 100%; padding: 8px 12px; border: 1px solid var(--warm); border-radius: 6px; background: var(--white); font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--ink); outline: none; }
  input.field:focus { border-color: var(--sage); }

  .spotify-link { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; background: #1db954; color: white; border-radius: 20px; text-decoration: none; font-size: 12px; font-weight: 500; margin-top: 8px; }
  .spotify-link:hover { background: #17a349; }

  /* ── SEQUENCE ── */
  .seq-toolbar { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; min-height: 30px; }
  .sel-count { font-size: 12px; color: var(--sage-dark); font-weight: 500; }

  /* GROUP HEADER */
  .group-hdr {
    display: flex; align-items: center; gap: 8px; padding: 7px 12px;
    background: var(--sage-dark); color: white; border-radius: 6px 6px 0 0;
    margin-top: 12px; position: relative;
  }
  .group-hdr-name {
    flex: 1; background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.3);
    color: white; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600;
    outline: none; padding: 1px 0; min-width: 80px;
  }
  .group-hdr-name::placeholder { color: rgba(255,255,255,0.4); }
  .group-hdr-meta { display: flex; gap: 6px; align-items: center; font-size: 11px; flex-shrink: 0; }
  .group-hdr-meta label { color: rgba(255,255,255,0.65); }
  .group-hdr-meta input[type=number] { width: 44px; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25); color: white; border-radius: 3px; padding: 2px 5px; font-family: 'DM Sans', sans-serif; font-size: 11px; outline: none; }
  .group-hdr-meta select { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25); color: white; border-radius: 3px; padding: 2px 5px; font-family: 'DM Sans', sans-serif; font-size: 11px; outline: none; }
  .group-hdr-meta select option { background: #2a2420; }
  .group-hdr-btn { background: none; border: none; cursor: pointer; color: rgba(255,255,255,0.6); font-size: 14px; padding: 2px 4px; }
  .group-hdr-btn:hover { color: white; }

  /* POSE ROW */
  .pose-block { }
  .pose-block.in-group:last-of-type .pose-row { border-radius: 0 0 6px 6px; }
  .pose-block.selected > .pose-row { background: #edf3ee; }

  .pose-row {
    display: flex; align-items: center; gap: 7px; padding: 7px 12px;
    background: var(--white); border: 1px solid var(--warm); border-top: none;
    transition: background 0.1s;
  }
  .pose-block:first-child .pose-row,
  .group-hdr + .pose-block .pose-row { border-top: none; }
  .pose-block.in-group .pose-row { border-left: 3px solid var(--sage-light); }

  .pose-check {
    width: 16px; height: 16px; border-radius: 3px; border: 1.5px solid #ddd;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    cursor: pointer; background: white; font-size: 10px; color: white;
    transition: all 0.15s;
  }
  .pose-check.on { background: var(--sage); border-color: var(--sage); }

  .pose-num { width: 20px; height: 20px; border-radius: 50%; background: var(--sage); color: white; font-size: 10px; font-weight: 600; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

  .pose-name-inp {
    flex: 1; border: none; background: transparent; font-family: 'DM Sans', sans-serif;
    font-size: 14px; color: var(--ink); outline: none; min-width: 0;
  }
  .pose-name-inp::placeholder { color: #ccc; }

  .pose-sanskrit { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 12px; color: var(--sage-dark); white-space: nowrap; flex-shrink: 0; }
  .pose-prop-tags { display: flex; gap: 3px; flex-shrink: 0; flex-wrap: wrap; }
  .ppt { display: inline-block; padding: 1px 5px; background: var(--clay-light); border-radius: 20px; font-size: 10px; }

  .pose-act { background: none; border: none; cursor: pointer; color: #ccc; font-size: 13px; padding: 2px 3px; border-radius: 3px; }
  .pose-act:hover { color: var(--ink-soft); background: var(--warm); }
  .pose-act.del:hover { color: #c0392b; background: #fde8e8; }

  /* POSE DETAILS */
  .pose-details {
    display: none; padding: 8px 12px 10px 58px;
    background: #faf7f4; border: 1px solid var(--warm); border-top: none;
    gap: 10px; flex-wrap: wrap;
  }
  .pose-details.open { display: flex; }
  .pose-block.in-group .pose-details { border-left: 3px solid var(--sage-light); }
  .pd-field { display: flex; flex-direction: column; gap: 3px; min-width: 110px; }
  .pd-field label { font-size: 10px; font-weight: 600; color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.05em; }
  .pd-field input, .pd-field select { padding: 4px 8px; border: 1px solid var(--warm); border-radius: 4px; font-family: 'DM Sans', sans-serif; font-size: 12px; background: var(--white); color: var(--ink); outline: none; }
  .pd-field textarea { padding: 4px 8px; border: 1px solid var(--warm); border-radius: 4px; font-family: 'DM Sans', sans-serif; font-size: 12px; background: var(--white); color: var(--ink); outline: none; resize: none; }
  .pd-props { display: flex; flex-wrap: wrap; gap: 5px; align-items: center; }
  .pd-prop-tag { display: inline-flex; align-items: center; padding: 2px 7px; background: var(--clay-light); border: 1px solid var(--clay); border-radius: 20px; font-size: 11px; }
  .pd-prop-inp { border: none; border-bottom: 1px solid var(--warm); background: transparent; font-family: 'DM Sans', sans-serif; font-size: 12px; outline: none; min-width: 130px; padding: 1px 3px; }
  .pd-prop-inp::placeholder { color: #ccc; }
  .pd-prop-inp:focus { border-bottom-color: var(--sage); }

  /* QUICK ADD */
  .quick-add-row { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: var(--cream); border: 1px solid var(--warm); border-top: none; border-radius: 0 0 6px 6px; margin-bottom: 4px; }
  .autocomplete-wrap { position: relative; flex: 1; }
  .quick-add-inp { width: 100%; border: none; background: transparent; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--ink); outline: none; }
  .quick-add-inp::placeholder { color: #bbb; }
  .ac-list { position: absolute; top: 100%; left: 0; right: 0; z-index: 300; background: var(--white); border: 1px solid var(--warm); border-radius: 6px; box-shadow: 0 4px 20px rgba(42,36,32,0.15); max-height: 180px; overflow-y: auto; display: none; }
  .ac-list.show { display: block; }
  .ac-item { padding: 7px 12px; cursor: pointer; font-size: 13px; border-bottom: 1px solid #f5f0ea; }
  .ac-item:last-child { border-bottom: none; }
  .ac-item:hover { background: #edf3ee; color: var(--sage-dark); }
  .ac-item small { color: var(--sage); font-family: 'Cormorant Garamond', serif; font-style: italic; margin-left: 6px; }

  /* GROUP MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(42,36,32,0.5); z-index: 200; align-items: center; justify-content: center; }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--white); border-radius: 10px; padding: 28px; max-width: 440px; width: 90%; box-shadow: 0 20px 60px rgba(42,36,32,0.3); }
  .modal h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 300; margin-bottom: 14px; }
  .modal-actions { display: flex; gap: 9px; justify-content: flex-end; margin-top: 18px; }
  .modal-field { margin-bottom: 12px; }
  .modal-field label { display: block; font-size: 11px; font-weight: 600; color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 5px; }
  .modal-field input, .modal-field select { width: 100%; padding: 7px 10px; border: 1px solid var(--warm); border-radius: 5px; font-family: 'DM Sans', sans-serif; font-size: 13px; background: var(--cream); color: var(--ink); outline: none; }
  .modal-field input:focus, .modal-field select:focus { border-color: var(--sage); }
  .existing-groups { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
  .existing-group-btn { padding: 8px 12px; border: 1px solid var(--warm); border-radius: 5px; background: var(--cream); cursor: pointer; text-align: left; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--ink); transition: all 0.15s; }
  .existing-group-btn:hover { border-color: var(--sage); background: #edf3ee; color: var(--sage-dark); }
  .existing-group-btn small { color: var(--ink-soft); font-size: 11px; margin-left: 6px; }

  /* SAVE BAR */
  .save-bar { position: sticky; bottom: 0; background: var(--white); border-top: 1px solid var(--warm); padding: 11px 32px; display: flex; gap: 9px; align-items: center; }
  .save-status { font-size: 11px; color: var(--ink-soft); margin-right: auto; font-style: italic; }

  .date-label { font-size: 10px; color: #bbb; margin-top: 2px; }

  @media (max-width: 680px) {
    .app { flex-direction: column; }
    .sidebar { width: 100%; min-width: unset; display: flex; max-height: 320px; }
    .class-list { max-height: 260px; overflow-y: auto; }
    .class-view { padding: 16px; }
    header { padding: 12px 16px; }
    .save-bar { padding: 10px 16px; }
    .group-hdr-meta { flex-wrap: wrap; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">prana <span>flow</span></div>
  <div class="header-actions">
    <button class="btn btn-secondary" onclick="loadFromDrive()" id="load-btn">☁ Load</button>
    <button class="btn btn-secondary" id="drive-btn" onclick="connectDrive()">☁ Drive</button>
    <button class="btn btn-primary" onclick="newClass()">+ New Class</button>
  </div>
</header>

<div class="app">
  <aside class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">My Classes</span>
      <span id="class-count" style="font-size:11px;color:#bbb;">0 saved</span>
    </div>
    <div class="search-box">
      <input type="text" placeholder="Search classes…" oninput="filterClasses(this.value)" id="search-input">
    </div>
    <div class="class-list" id="class-list">
      <div class="empty-sidebar"><div style="font-size:2rem;margin-bottom:8px;">🌿</div>No classes yet.</div>
    </div>
  </aside>
  <main class="main" id="main-area">
    <div class="welcome">
      <div class="welcome-icon">🧘</div>
      <h2>Your Yoga Class Planner</h2>
      <p>Build sequences, group poses, attach playlists, and sync across devices.</p>
      <button class="btn btn-primary" style="padding:11px 26px;font-size:13px;" onclick="newClass()">Create Class</button>
    </div>
  </main>
</div>

<!-- Delete class modal -->
<div class="modal-overlay" id="delete-modal">
  <div class="modal">
    <h3>Delete this class?</h3>
    <p style="color:var(--ink-soft);font-size:13px;margin-bottom:16px;">This cannot be undone.</p>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('delete-modal')">Cancel</button>
      <button class="btn btn-danger" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<!-- Drive modal -->
<div class="modal-overlay" id="drive-modal">
  <div class="modal">
    <h3>Connect Google Drive</h3>
    <p style="color:var(--ink-soft);font-size:13px;margin-bottom:16px;">Your classes sync to your Drive, accessible from any device.</p>
    <div id="drive-modal-content">
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModal('drive-modal')">Cancel</button>
        <button class="btn btn-primary" onclick="connectDrive()">Connect</button>
      </div>
    </div>
  </div>
</div>

<!-- Group modal -->
<div class="modal-overlay" id="group-modal">
  <div class="modal">
    <h3 id="group-modal-title">Group Selected Poses</h3>
    <div id="group-modal-body"></div>
    <div class="modal-actions" id="group-modal-actions"></div>
  </div>
</div>

function lookupSanskrit(name) {
  if (!name) return '';
  const key = name.trim().toLowerCase().replace(/[''']/g,"'").replace(/\s+/g,' ');
  if (SANSKRIT[key]) return SANSKRIT[key];
  for (const k of Object.keys(SANSKRIT)) { if (key.includes(k)||k.includes(key)) return SANSKRIT[k]; }
  return '';
}

const ALL_POSES = Object.keys(SANSKRIT)
  .map(k=>({ english: k.split(' ').map(w=>w.charAt(0).toUpperCase()+w.slice(1)).join(' '), sanskrit: SANSKRIT[k] }))
  .filter((v,i,a)=>a.findIndex(x=>x.sanskrit===v.sanskrit)===i)
  .sort((a,b)=>a.english.localeCompare(b.english));

// ── RENDER POSE LIST ───────────────────────────────────────────
function renderPoseList(cls) {
  const poses = cls.poses || [];
  const groups = cls.groups || [];
  if (!poses.length) return renderQuickAdd();

  let html = '';
  let lastGroupId = 'NONE_YET';
  let poseNum = 0;

  poses.forEach((p, i) => {
    const gid = p.groupId || null;
    const grp = gid ? groups.find(g=>g.id===gid) : null;

    // If new group starts, render group header
    if (gid !== lastGroupId) {
      if (gid && grp) {
        const roundsLabel = grp.rounds > 1 ? `${grp.rounds}×` : '';
        const sideLabel = grp.side && grp.side !== '—' ? grp.side : '';
        html += `
          <div class="group-hdr" id="ghdr-${grp.id}">
            <input class="group-hdr-name" value="${esc(grp.name||'')}" placeholder="Group name…"
              oninput="updateGroup('${grp.id}','name',this.value)">
            <div class="group-hdr-meta">
              <label>Rounds</label>
              <input type="number" min="1" max="20" value="${grp.rounds||1}" style="width:44px;"
                oninput="updateGroup('${grp.id}','rounds',parseInt(this.value)||1)">
              <label>Side</label>
              <select onchange="updateGroup('${grp.id}','side',this.value)">
                ${SIDES.map(s=>`<option value="${s}" ${(grp.side||'—')===s?'selected':''}>${s}</option>`).join('')}
              </select>
            </div>
            <button class="group-hdr-btn" onclick="deleteGroup('${grp.id}')" title="Remove group (keeps poses)">✕</button>
          </div>`;
      }
      lastGroupId = gid;
    }

    poseNum++;
    html += renderPoseBlock(p, poseNum, !!grp, i, poses.length);
  });

  html += renderQuickAdd();
  return html;
}

        ${idx<total-1?`<button class="pose-act" onclick="event.stopPropagation();movePose('${p.id}',1)">↓</button>`:''}
        <button class="pose-act del" onclick="event.stopPropagation();deletePose('${p.id}')">✕</button>
      </div>
      <div class="pose-details ${hasDetails?'open':''}" id="pd-${p.id}">
        <div class="pd-field">

          <input type="text" value="${esc(p.duration||'')}" placeholder="e.g. 5 breaths"
            oninput="updatePoseField('${p.id}','duration',this.value)">
        </div>
        <div class="pd-field">
          <label>Side</label>
          <select onchange="updatePoseField('${p.id}','side',this.value)">
            ${['—','Both','Right','Left','N/A'].map(s=>`<option value="${s}" ${(p.side||'—')===s?'selected':''}>${s}</option>`).join('')}

        </div>
        <div class="pd-field">

        </div>
        <div class="pd-field" style="flex:1 1 100%;">
          <label>Props</label>

// ── AUTOCOMPLETE (event delegation) ───────────────────────────
document.addEventListener('input', function(e) {
  if (!e.target.classList.contains('quick-add-inp')) return;
  const val = e.target.value.trim().toLowerCase();
  const list = document.getElementById('ac-list');
  if (!list) return;
  if (!val) { list.classList.remove('show'); list.innerHTML=''; return; }
  const matches = ALL_POSES.filter(p=>p.english.toLowerCase().includes(val)||p.sanskrit.toLowerCase().includes(val)).slice(0,8);
  if (!matches.length) { list.classList.remove('show'); list.innerHTML=''; return; }
  list.innerHTML = matches.map(p=>`<div class="ac-item" data-name="${esc(p.english)}">${p.english} <small>${p.sanskrit}</small></div>`).join('');
  list.classList.add('show');
});

document.addEventListener('mousedown', function(e) {
  if (!e.target.classList.contains('ac-item')) return;
  e.preventDefault();
  const name = e.target.dataset.name;
  const inp = document.getElementById('quick-add-inp');
  if (inp) inp.value = name;
  const list = document.getElementById('ac-list');
  if (list) { list.classList.remove('show'); list.innerHTML=''; }
  doAddPose(name);
});

document.addEventListener('click', function(e) {
  if (!e.target.classList.contains('quick-add-inp') && !e.target.classList.contains('ac-item')) {
    const list = document.getElementById('ac-list');
    if (list) { list.classList.remove('show'); list.innerHTML=''; }
  }
});

document.addEventListener('keydown', function(e) {
  if (e.key==='Enter' && e.target.classList.contains('quick-add-inp')) {
    e.preventDefault();
    doAddPose(e.target.value.trim());
    e.target.value='';
    const list = document.getElementById('ac-list');
    if (list) { list.classList.remove('show'); list.innerHTML=''; }
  }
});

function addPoseByButton() {
  const inp = document.getElementById('quick-add-inp');
  if (!inp) return;
  doAddPose(inp.value.trim());
  inp.value='';
}

function doAddPose(name) {
  if (!name) return;
  const cls = getClass(); if (!cls) return;
  const pose = { id:uid(), name, sanskrit:lookupSanskrit(name), groupId:null, duration:'', side:'—', rounds:1, notes:'', props:[] };
  cls.poses.push(pose); save();
  refreshPoseList();
  setTimeout(()=>{ const i=document.getElementById('quick-add-inp'); if(i) i.focus(); },50);
}

// ── POSE ACTIONS ───────────────────────────────────────────────
function togglePoseDetails(pid) {
  const el = document.getElementById(`pd-${pid}`);
  if (el) el.classList.toggle('open');
}

function updatePoseName(pid, value) {
  const cls=getClass(); if(!cls) return;
  const p=cls.poses.find(x=>x.id===pid); if(!p) return;
  p.name=value; p.sanskrit=lookupSanskrit(value); save();
  const sk=document.getElementById(`sk-${pid}`);
  if(sk) sk.textContent=p.sanskrit;
}

function updatePoseField(pid, field, value) {
  const cls=getClass(); if(!cls) return;
  const p=cls.poses.find(x=>x.id===pid); if(!p) return;
  p[field]=value; save();
}

function movePose(pid, dir) {
  const cls=getClass(); if(!cls) return;
  const i=cls.poses.findIndex(x=>x.id===pid); if(i<0) return;
  const j=i+dir; if(j<0||j>=cls.poses.length) return;
  [cls.poses[i],cls.poses[j]]=[cls.poses[j],cls.poses[i]]; save();
  refreshPoseList();
}

function deletePose(pid) {
  const cls=getClass(); if(!cls) return;
  cls.poses=cls.poses.filter(x=>x.id!==pid); save();
  selectedPoseIds.delete(pid);
  refreshPoseList();
}

// ── PROPS ──────────────────────────────────────────────────────
function addProp(e, pid) {
  if(e.key!=='Enter'&&e.key!==',') return;
  e.preventDefault();
  const val=e.target.value.trim().replace(/,$/,''); if(!val) return;
  const cls=getClass(); if(!cls) return;
  const p=cls.poses.find(x=>x.id===pid); if(!p) return;
  p.props=p.props||[];
  if(!p.props.includes(val)) p.props.push(val);
  e.target.value=''; save();
  refreshProps(pid, p.props);
}

function removeProp(pid, prop) {
  const cls=getClass(); if(!cls) return;
  const p=cls.poses.find(x=>x.id===pid); if(!p) return;
  p.props=(p.props||[]).filter(x=>x!==prop); save();
  refreshProps(pid, p.props);
}

function refreshProps(pid, props) {
  const container=document.getElementById(`pdp-${pid}`); if(!container) return;
  const inp=container.querySelector('.pd-prop-inp');
  container.innerHTML=props.map(pr=>`<span class="pd-prop-tag">${esc(pr)} <button onclick="removeProp('${pid}','${pr}')" style="background:none;border:none;cursor:pointer;color:var(--clay);margin-left:2px;">×</button></span>`).join('');
  if(inp) container.appendChild(inp);
  else {
    const ni=document.createElement('input');
    ni.className='pd-prop-inp'; ni.placeholder='Add prop, press Enter…'; ni.autocomplete='off';
    ni.setAttribute('onkeydown',`addProp(event,'${pid}')`);
    container.appendChild(ni);
  }
  // Update inline tags on pose row
  const pb=document.getElementById(`pb-${pid}`);
  if(pb) {
    let tagDiv=pb.querySelector('.pose-prop-tags');
    const tagHtml=props.map(pr=>`<span class="ppt">${esc(pr)}</span>`).join('');
    if(props.length) {
      if(tagDiv) tagDiv.innerHTML=tagHtml;
      else {
        const sk=pb.querySelector('.pose-sanskrit');
        if(sk) sk.insertAdjacentHTML('afterend',`<div class="pose-prop-tags">${tagHtml}</div>`);
      }
    } else if(tagDiv) tagDiv.remove();
  }
}

// ── SELECTION ──────────────────────────────────────────────────
function toggleSelect(pid) {
  if(selectedPoseIds.has(pid)) selectedPoseIds.delete(pid);
  else selectedPoseIds.add(pid);
  // Update UI for this pose block
  const pb=document.getElementById(`pb-${pid}`);
  if(pb) {
    pb.classList.toggle('selected', selectedPoseIds.has(pid));
    const chk=pb.querySelector('.pose-check');
    if(chk) { chk.classList.toggle('on',selectedPoseIds.has(pid)); chk.textContent=selectedPoseIds.has(pid)?'✓':''; }
  }
  updateToolbar();
}

function clearSelection() {
  selectedPoseIds.forEach(pid=>{
    const pb=document.getElementById(`pb-${pid}`);
    if(pb) { pb.classList.remove('selected'); const c=pb.querySelector('.pose-check'); if(c){c.classList.remove('on');c.textContent='';} }
  });
  selectedPoseIds=new Set();
  updateToolbar();
}

function updateToolbar() {
  const n=selectedPoseIds.size;
  const cnt=document.getElementById('sel-count');
  const gbtn=document.getElementById('group-btn');
  const ubtn=document.getElementById('ungroup-btn');
  const cbtn=document.getElementById('clear-sel-btn');
  if(!cnt) return;
  const show=n>0;
  cnt.style.display=show?'':'none';
  gbtn.style.display=show?'':'none';
  cbtn.style.display=show?'':'none';
  cnt.textContent=`${n} pose${n!==1?'s':''} selected`;
  // Show ungroup only if any selected pose is in a group
  const cls=getClass();
  const anyGrouped=cls&&[...selectedPoseIds].some(pid=>{ const p=cls.poses.find(x=>x.id===pid); return p&&p.groupId; });
  ubtn.style.display=(show&&anyGrouped)?'':'none';
}

          </button>`).join('')}
      </div>
    </div>
    <div style="font-size:11px;font-weight:600;color:var(--ink-soft);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px;">Or create new group</div>
  ` : '';

  body.innerHTML=`
    ${existingHtml}
    <div class="modal-field">
      <label>Group Name</label>
      <input id="new-group-name" placeholder="e.g. Warm Up, Flow, Cool Down…">
    </div>
    <div style="display:flex;gap:12px;">
      <div class="modal-field" style="flex:1;">
        <label>Rounds</label>
        <input type="number" id="new-group-rounds" value="1" min="1" max="20">
      </div>
      <div class="modal-field" style="flex:2;">
        <label>Side</label>
        <select id="new-group-side">
          ${SIDES.map(s=>`<option value="${s}">${s}</option>`).join('')}
        </select>
      </div>
    </div>`;

  actions.innerHTML=`
    <button class="btn btn-ghost" onclick="closeModal('group-modal')">Cancel</button>
    <button class="btn btn-primary" onclick="createNewGroup()">Create Group</button>`;

  openModal('group-modal');
  setTimeout(()=>{ const i=document.getElementById('new-group-name'); if(i) i.focus(); },100);
}

function createNewGroup() {
  const cls=getClass(); if(!cls) return;
  const name=document.getElementById('new-group-name').value.trim();
  const rounds=parseInt(document.getElementById('new-group-rounds').value)||1;
  const side=document.getElementById('new-group-side').value;
  const grp={id:'g'+Date.now(), name, rounds, side};
  cls.groups=cls.groups||[];
  cls.groups.push(grp);
  assignToGroup(grp.id);
}

function addToGroup(gid) {
  closeModal('group-modal');
  assignToGroup(gid);
}

function assignToGroup(gid) {
  const cls=getClass(); if(!cls) return;
  selectedPoseIds.forEach(pid=>{
    const p=cls.poses.find(x=>x.id===pid);
    if(p) p.groupId=gid;
  });
  save(); closeModal('group-modal');
  clearSelection();
  refreshPoseList();
}

function ungroupSelected() {
  const cls=getClass(); if(!cls) return;
  selectedPoseIds.forEach(pid=>{
    const p=cls.poses.find(x=>x.id===pid);
    if(p) p.groupId=null;
  });
  // Clean up empty groups
  cleanEmptyGroups(cls);
  save(); clearSelection(); refreshPoseList();
}

function cleanEmptyGroups(cls) {
  const usedIds=new Set(cls.poses.map(p=>p.groupId).filter(Boolean));
  cls.groups=(cls.groups||[]).filter(g=>usedIds.has(g.id));
}

function deleteGroup(gid) {
  const cls=getClass(); if(!cls) return;
  // Remove group from all poses (ungroup them, keep poses)
  cls.poses.forEach(p=>{ if(p.groupId===gid) p.groupId=null; });
  cls.groups=(cls.groups||[]).filter(g=>g.id!==gid);
  save(); refreshPoseList();
}

function updateGroup(gid, field, value) {
  const cls=getClass(); if(!cls) return;
  const g=cls.groups.find(x=>x.id===gid); if(!g) return;
  g[field]=value; save();
}

// ── REFRESH POSE LIST ──────────────────────────────────────────
function refreshPoseList() {
  const cls=getClass(); if(!cls) return;
  const el=document.getElementById('pose-list');
  if(el) el.innerHTML=renderPoseList(cls);
  updateToolbar();
}

// ── FIELD UPDATES ──────────────────────────────────────────────
function updateField(field, value) {
  const cls=getClass(); if(!cls) return;
  cls[field]=value; save();
  if(field==='name') renderSidebar(document.getElementById('search-input').value);
  if(field==='spotifyUrl'&&value.includes('spotify')) {
    const inp=document.getElementById('spotify-inp');
    if(inp&&!inp.parentNode.querySelector('.spotify-link')) {
      const a=document.createElement('a'); a.href=value; a.target='_blank'; a.className='spotify-link'; a.textContent='▶ Open in Spotify';
      inp.parentNode.appendChild(a);
    }
  }
}

// ── DELETE CLASS ───────────────────────────────────────────────
function deleteClass(id) { deleteTargetId=id; openModal('delete-modal'); }
function confirmDelete() {
  classes=classes.filter(c=>c.id!==deleteTargetId); save(); closeModal('delete-modal');
  currentClassId=null; renderSidebar('');
  document.getElementById('main-area').innerHTML=`<div class="welcome"><div class="welcome-icon">🌿</div><h2>Class deleted</h2><p>Select a class or create a new one.</p><button class="btn btn-primary" style="padding:11px 24px;" onclick="newClass()">Create Class</button></div>`;
}

// ── SAVE ───────────────────────────────────────────────────────
function save() {
  localStorage.setItem('yogaClasses',JSON.stringify(classes));
  const s=document.getElementById('save-status'); if(s) s.textContent='Saved · '+new Date().toLocaleTimeString();
}
function exportJSON() {
  const cls=getClass(); if(!cls) return;
  const b=new Blob([JSON.stringify(cls,null,2)],{type:'application/json'});
  const u=URL.createObjectURL(b),a=document.createElement('a');
  a.href=u; a.download=(cls.name||'yoga-class').replace(/\s+/g,'-').toLowerCase()+'.json';
  a.click(); URL.revokeObjectURL(u);
}

// ── GOOGLE DRIVE ───────────────────────────────────────────────
function connectDrive() { loadGapi(CLIENT_ID); closeModal('drive-modal'); }
function loadGapi(clientId) {
  if(document.querySelector('script[src*="api.js"]')) return;
  const s1=document.createElement('script'); s1.src='https://apis.google.com/js/api.js';
  s1.onload=()=>gapi.load('client',async()=>{
    await gapi.client.init({discoveryDocs:['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest']});
    gapiInited=true;
  });
  document.head.appendChild(s1);
  const s2=document.createElement('script'); s2.src='https://accounts.google.com/gsi/client';
  s2.onload=()=>{
    tokenClient=google.accounts.oauth2.initTokenClient({client_id:clientId,scope:SCOPES,
      callback:async(resp)=>{
        if(resp.error){console.error(resp);return;}
        driveConnected=true; setDriveReady();
        if(pendingDriveAction==='load') await fetchFromDrive();
        else await syncToDrive();
        pendingDriveAction=null;
      }
    });
    gisInited=true;
  };
  document.head.appendChild(s2);
}
function setDriveReady() {
  const b=document.getElementById('drive-btn'); if(b){b.textContent='☁ Drive ✓';b.style.color='#b5cdb7';}
}
async function saveToDrive() {
  pendingDriveAction='save';
  if(!tokenClient){loadGapi(CLIENT_ID);setTimeout(()=>tokenClient&&tokenClient.requestAccessToken({prompt:''}),2500);return;}
  tokenClient.requestAccessToken({prompt:''});
}
async function loadFromDrive() {
  pendingDriveAction='load';
  if(!tokenClient){loadGapi(CLIENT_ID);setTimeout(()=>tokenClient&&tokenClient.requestAccessToken({prompt:''}),2500);return;}
  tokenClient.requestAccessToken({prompt:''});
}
async function syncToDrive() {
  const blob=new Blob([JSON.stringify(classes,null,2)],{type:'application/json'});
  const search=await gapi.client.drive.files.list({q:`name='${DRIVE_FILE}' and trashed=false`,fields:'files(id)'});
  const files=search.result.files;
  const form=new FormData();
  form.append('metadata',new Blob([JSON.stringify({name:DRIVE_FILE,mimeType:'application/json'})],{type:'application/json'}));
  form.append('file',blob);
  const has=files&&files.length;
  const resp=await fetch(has?`https://www.googleapis.com/upload/drive/v3/files/${files[0].id}?uploadType=multipart`:`https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart`,
    {method:has?'PATCH':'POST',headers:{Authorization:'Bearer '+gapi.client.getToken().access_token},body:form});
  if(resp.ok){const s=document.getElementById('save-status');if(s)s.textContent='☁ Synced · '+new Date().toLocaleTimeString();}
}
async function fetchFromDrive() {
  try {
    const search=await gapi.client.drive.files.list({q:`name='${DRIVE_FILE}' and trashed=false`,fields:'files(id)'});
    const files=search.result.files;
    if(!files||!files.length){alert('No saved classes found in Drive.');return;}
    const resp=await fetch(`https://www.googleapis.com/drive/v3/files/${files[0].id}?alt=media`,
      {headers:{Authorization:'Bearer '+gapi.client.getToken().access_token}});
    const data=await resp.json();
    if(Array.isArray(data)&&data.length){
      classes=data;
      localStorage.setItem('yogaClasses',JSON.stringify(classes));
      currentClassId=null; renderSidebar('');
      document.getElementById('main-area').innerHTML=`<div class="welcome"><div class="welcome-icon">🌿</div><h2>${classes.length} class${classes.length!==1?'es':''} loaded!</h2><p>Select a class from the sidebar.</p></div>`;
    } else alert('No classes found in your Drive file.');
  } catch(e){console.error(e);alert('Could not load from Drive.');}
}

// ── INIT ───────────────────────────────────────────────────────
renderSidebar();
loadGapi(CLIENT_ID);
setTimeout(setDriveReady,2500);
</script>
</body>
